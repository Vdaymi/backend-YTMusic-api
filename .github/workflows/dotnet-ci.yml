name: .NET CI Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore YTMusicApi.sln

    - name: Build project
      run: dotnet build YTMusicApi.sln --configuration Release --no-restore

    - name: Run Unit Tests
      run: dotnet test YTMusicApi.Orchestrator.Tests/YTMusicApi.Orchestrator.Tests.csproj --no-build --configuration Release

    - name: Run Integration Tests
      run: dotnet test YTMusicApi.IntegrationTest/YTMusicApi.IntegrationTest.csproj --no-build --configuration Release
      env:
        JwtOptions__SecretKey: ${{ secrets.JWT_SECRET_KEY }}